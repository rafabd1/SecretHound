    encryption_key:
        regex: (?i)['"]?enc(?:ryption)?[_-]?key['"]?\s*[=:]\s*['"]([a-zA-Z0-9+/]{16,64})['"]
        description: Encryption Key
        enabled: true
        category: crypto
        minlength: 16
        contextpenaltyany:
