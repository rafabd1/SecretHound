patterns:
    api_key_assignment:
        regex: '[''"]?(?:api_?key|api_?secret|app_?key|app_?secret)[''"]?\s*[=:]\s*[''"]([a-zA-Z0-9_\-\.]{16,64})[''"]'
        description: API Key Assignment
        enabled: true
        category: generic
        minlength: 16
        contextpenaltyany:
            - example
            - sample
            - placeholder
            - test
            - your
            - xxx
        useentropy: true
        minentropy: 3.5
        entropyminlength: 16
    auth_token:
        regex: '[''"]?([a-zA-Z0-9_\-\.]{32,64})[''"]?\s*[,;]?\s*\/\/\s*[Aa]uth(?:entication)?\s+[Tt]oken'
        description: Authentication Token (Comment Based)
        enabled: true
        category: auth
        minlength: 32
        maxlength: 64
    aws_access_key:
        regex: AKIA[0-9A-Z]{16}
        description: AWS Access Key ID
        enabled: true
        category: aws
        minlength: 20
        maxlength: 20
        contextboostany:
            - aws
            - amazon
            - access
            - key
    aws_secret_key:
        regex: (?i)aws.{0,20}['"][0-9a-zA-Z/+]{40}['"]
        description: AWS Secret Access Key
        enabled: true
        category: aws
        minlength: 40
        maxlength: 40
        contextboostany:
            - aws
            - amazon
            - secret
    azure_connection_string:
        regex: DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[^;]+;EndpointSuffix=
        description: Azure Storage Connection String
        enabled: true
        category: azure
        minlength: 70
    azure_cosmosdb:
        regex: AccountEndpoint=https:\/\/[^.]+\.documents\.azure\.com:443\/;AccountKey=[^;]+;
        description: Azure CosmosDB Connection String
        enabled: true
        category: azure
        minlength: 70
        contextpenaltyany:
            - example
            - placeholder
            - sample
    azure_service_bus:
        regex: Endpoint=sb:\/\/[^.]+\.servicebus\.windows\.net\/;SharedAccessKeyName=[^;]+;SharedAccessKey=[^;]+
        description: Azure Service Bus Connection String
        enabled: true
        category: azure
        minlength: 60
        contextpenaltyany:
            - example
            - placeholder
            - sample
    azure_sql_connection:
        regex: Server=tcp:[^,]+,1433;Initial Catalog=[^;]+;Persist Security Info=False;User ID=[^;]+;Password=[^;]+;
        description: Azure SQL Connection String
        enabled: true
        category: azure
        minlength: 50
        contextpenaltyany:
            - example
            - placeholder
            - sample
    basic_auth:
        regex: (?i)(?:basic\\s+)(?:[a-zA-Z0-9\\+\\/=]{20,100}=*)
        description: HTTP Basic Authentication
        enabled: false
        category: auth
        minlength: 25
        contextpenaltyany:
            - example
            - sample
            - usage
            - caption
            - documentation
            - test
            - '@example'
            - description
            - tutorial
            - unicode
            - Basic Multilingual
            - BMP
            - fromCharCode
            - createElement
            - <h1
            - <h2
            - <h3
            - <h4
            - <h5
            - <h6
            - Basic authorization
            - Basic authentication
            - Basic configuration
    bearer_token:
        regex: (?i)bearer\\s+[a-zA-Z0-9_\\-\\.=]{10,500}
        description: Bearer Token
        enabled: true
        category: auth
        minlength: 20
        contextpenaltyany:
            - QVO
            - QUO
            - YO
            - 'accessToken:'
            - .accessToken
            - oauth_token=
            - variable
            - config
            - credential
            - INVALID_ACCESS_TOKEN
            - MISSING_ACCESS_TOKEN
        useentropy: true
        minentropy: 3.6
        entropyminlength: 20
    braintree_token:
        regex: access_token\$production\$[0-9a-z]{16}\$[0-9a-f]{32}
        description: Braintree Access Token
        enabled: true
        category: payment
        minlength: 67
    config_api_key:
        regex: '[''"]?(?:api|app)(?:_|-|\.)?(?:key|token|secret)[''"]?\s*[:=]\s*[''"]([a-zA-Z0-9_\-\.]{8,})[''"]'
        description: Configuration API Key
        enabled: true
        category: config
        minlength: 8
        useentropy: true
        minentropy: 3.5
        entropyminlength: 12
    config_secret:
        regex: '[''"]?(?:secret|private|auth)(?:_|-|\.)?(?:key|token)[''"]?\s*[:=]\s*[''"]([a-zA-Z0-9_\-\.]{8,})[''"]'
        description: Configuration Secret
        enabled: true
        category: config
        minlength: 8
        useentropy: true
        minentropy: 3.5
        entropyminlength: 12
    credit_card_number:
        regex: (?i)(?:card_?number|cc-number|credit_?card|pan|cc_num)\s*[:=]\s*['"]?(\b(?:\d[ -]*?){13,19}\b|\b\d{4}[ -]?\*{4}[ -]?\*{4}[ -]?\d{4}\b|\b\d{6}[ -]?\*{6}[ -]?\d{4}\b)['"]?
        description: Credit Card Number (PAN)
        enabled: true
        category: payment
        minlength: 13
        maxlength: 23
        contextboostany:
            - card
            - credit
            - cc
            - pan
        contextpenaltyany:
            - example
            - test
            - sample
            - placeholder
            - "1234"
            - XXXX
            - visa
            - mastercard
            - amex
            - dummy
            - fake
            - test_card
            - card-number-input
            - card-expiry-input
            - card-cvc-input
    digitalocean_access_token:
        regex: dop_v1_[a-f0-9]{64}
        description: DigitalOcean Personal Access Token
        enabled: true
        category: cloud
        minlength: 69
        contextpenaltyany:
