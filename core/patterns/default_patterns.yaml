    generic_password:
        regex: (?i)(?:password|passwd|pwd|secret)[\\s]*[=:]+[\\s]*["']([^'"]{8,30})["']
        description: Generic Password
        enabled: false
        category: generic
        minlength: 8
        maxlength: 30
        contextpenaltyany:
            - match
            - valid
            - must
            - should
            - hint
