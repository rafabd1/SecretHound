    generic_password:
        regex: (?i)(?:password|passwd|pwd|secret)[\\s]*[=:]+[\\s]*["']([^'"]{8,30})["']
        description: Generic Password
        enabled: false
        category: generic
        minlength: 8
        maxlength: 30
        contextpenaltyany:
            - match
            - valid
            - must
            - should
            - hint
            - help
            - message
            - error
            - Change password
            - Reset password
            - Forgot password
            - pseudo
            - selector
            - createElement
            - render
            - component
            - input[type
            - USERNAME
            - PASSWORD
            - '[REDACTED]'
            - switch_to_
        useentropy: true
        minentropy: 3.3
        entropyminlength: 10
    github_fine_grained_token:
        regex: github_pat_[0-9A-Za-z_]{82}
        description: GitHub Fine-Grained Personal Access Token
        enabled: true
        category: code
        minlength: 90
        useentropy: true
        minentropy: 3.6
        entropyminlength: 50
    github_personal_token:
        regex: (?:ghp|ghu|ghs|ghr)_[0-9a-zA-Z]{36,251}
        description: GitHub Personal Token (Classic & Fine-Grained)
        enabled: true
        category: code
        minlength: 40
        contextpenaltyany:
            - _white_
            - _template_
            - _ng_
            - .svg
            - .png
    github_token:
        regex: ghp_[0-9a-zA-Z]{36}
        description: GitHub Personal Access Token (New Format)
        enabled: true
        category: code
        minlength: 40
    gitlab_personal_token:
        regex: glpat-[0-9a-zA-Z_\-]{20,}
        description: GitLab Personal Access Token
        enabled: true
        category: ci
        minlength: 25
    gitlab_runner_token:
        regex: glrt-[0-9a-zA-Z_\-]{20,}
        description: GitLab Runner Registration Token
        enabled: true
        category: ci
        minlength: 25
    google_api_key:
        regex: AIza[0-9A-Za-z\-_]{35}
        description: Google API Key
        enabled: true
        category: gcp
        minlength: 39
        maxlength: 39
    google_cloud_platform:
        regex: '[0-9]+-[0-9A-Za-z_]{32}\\.apps\\.googleusercontent\\.com'
        description: Google Cloud Platform API Key
        enabled: true
        category: gcp
        minlength: 40
    heroku_api_key:
        regex: '[h|H][e|E][r|R][o|O][k|K][u|U].{0,30}[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}'
        description: Heroku API Key
        enabled: true
        category: cloud
        minlength: 30
    huggingface_api_token:
        regex: hf_[A-Za-z0-9]{34}
        description: Hugging Face Access Token
        enabled: true
        category: cloud
        minlength: 37
        maxlength: 37
        useentropy: true
        minentropy: 3.4
        entropyminlength: 20
    ipv4_address:
        regex: (?i)(?:^|[^0-9.])(?:ip[_-]?addr(?:ess)?|host[_-]?(?:name|addr)?|server[_-]?(?:ip|addr))\s*[:=]\s*['"]?((?:(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9][0-9]|[1-9])\.){3}(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9]))['"]?
        description: 'IPv4 Address (associated with a keyworded key, e.g., server_ip: 1.2.3.4)'
        enabled: true
        category: pii
        minlength: 7
        maxlength: 15
        requiredcontextany:
            - ip
            - address
            - host
            - server
        contextboostany:
            - ip
            - address
            - host
            - server
        contextpenaltyany:
            - 0.0.0.0
            - 127.0.0.1
            - localhost
            - 1.3.6.1
            - 2.16.840
            - 1.2.840
            - oid
            - 'urn:'
            - OID
    ipv6_address:
        regex: (?i)(?:ipv6|ip6)[_-]?(?:addr(?:ess)?)?\s*[:=]\s*['"]?((?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|(?:[0-9a-fA-F]{1,4}:){1,7}:|(?:[0-9a-fA-F]{1,4}:){6}:[0-9a-fA-F]{1,4})['"]?
